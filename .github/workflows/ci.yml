name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - name: conformance vs Qallow C decoder
        run: |
          git clone --depth 1 https://github.com/xingxerx/Qallow.git /tmp/Qallow
          cargo build -p conformance-emitter
          ./target/debug/emit /tmp/stream.bin
          gcc -I/tmp/Qallow/include -o conformance/verify conformance/verify.c /tmp/Qallow/src/mind/sync_wire.c
          ./conformance/verify /tmp/stream.bin

  # End-to-end smoke: limend -> ductei-limen-relay, four scenarios
  # (good job, restart replicability, malformed request, malformed cert)
  # with the hard invariants asserted inline. See scripts/smoke_e2e.py.
  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      # Rev-pin discipline (ATRIUM AGENTS.md): bumping this pin is a
      # deliberate, auditable commit, never an implicit float to main.
      LIMEN_REV: fd3f505d01be871d3b547221f384666b1d013326
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: checkout LIMEN at pinned rev
        run: |
          git clone https://github.com/xingxerx/LIMEN.git /tmp/LIMEN
          git -C /tmp/LIMEN checkout "$LIMEN_REV"
      - name: install LIMEN (simulator path only, no QPU extras)
        run: pip install /tmp/LIMEN
      - name: run smoke scenarios
        run: python scripts/smoke_e2e.py --limen /tmp/LIMEN

  # Second real consumer pair: limend -> ductei-limen-relay ->
  # ductei-qallow-relay -> real `qallow ingest` -> real LMDB. See
  # ATRIUM harness-roadmap/02-spine-flow.md ("Qallow pair first").
  e2e-smoke-qallow:
    runs-on: ubuntu-latest
    env:
      LIMEN_REV: fd3f505d01be871d3b547221f384666b1d013326
      QALLOW_REV: 0a546b307c21b81f93ee56f5013698357662eff9
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: checkout LIMEN at pinned rev
        run: |
          git clone https://github.com/xingxerx/LIMEN.git /tmp/LIMEN
          git -C /tmp/LIMEN checkout "$LIMEN_REV"
      - name: install LIMEN (simulator path only, no QPU extras)
        run: pip install /tmp/LIMEN
      - name: checkout and build Qallow at pinned rev
        run: |
          git clone https://github.com/xingxerx/Qallow.git /tmp/Qallow
          git -C /tmp/Qallow checkout "$QALLOW_REV"
          cargo build --manifest-path /tmp/Qallow/Cargo.toml -p qallow_cli
      - name: run smoke scenarios
        run: |
          python scripts/smoke_qallow.py --limen /tmp/LIMEN \
            --qallow-cli /tmp/Qallow/target/debug/qallow

  # Third real consumer pair: VEYN's in-process ductei_bridge ->
  # ductei-qallow-relay (reused unmodified) -> `qallow ingest` -> LMDB.
  # See ATRIUM harness-roadmap/02-spine-flow.md ("VEYN pair second").
  e2e-smoke-veyn:
    runs-on: ubuntu-latest
    env:
      VEYN_REV: 1913f41e4b867351ef12bad196cc7653a674c84d
      QALLOW_REV: 0a546b307c21b81f93ee56f5013698357662eff9
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: checkout VEYN at pinned rev
        run: |
          git clone https://github.com/xingxerx/VEYN.git /tmp/VEYN
          git -C /tmp/VEYN checkout "$VEYN_REV"
      - name: install VEYN's system deps (BLE/dbus, per VEYN's own .cargo/config.toml)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: checkout and build Qallow at pinned rev
        run: |
          git clone https://github.com/xingxerx/Qallow.git /tmp/Qallow
          git -C /tmp/Qallow checkout "$QALLOW_REV"
          cargo build --manifest-path /tmp/Qallow/Cargo.toml -p qallow_cli
      - name: run smoke scenarios
        run: |
          python scripts/smoke_veyn.py --veyn /tmp/VEYN \
            --qallow-cli /tmp/Qallow/target/debug/qallow
